<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DeepFocus — Sign In</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --bg: #111111;
                --s1: #1a1a1a;
                --s2: #222222;
                --accent: #f0f0f0;
                --text: #e8e8e8;
                --muted: #888888;
                --dim: #444444;
                --border: #2e2e2e;
                --red: #cc4444;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: 'DM Mono', monospace;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-size: 14px;
            }

            body::before {
                content: '';
                position: fixed;
                top: -20%;
                left: 50%;
                transform: translateX(-50%);
                width: 80vw;
                height: 60vh;
                background: radial-gradient(
                    ellipse,
                    rgba(240, 240, 240, 0.025) 0%,
                    transparent 70%
                );
                pointer-events: none;
            }

            /* ── CARD ── */
            .card {
                width: 100%;
                max-width: 400px;
                padding: 0 24px;
                position: relative;
                z-index: 1;
            }

            /* Brand */
            .brand {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 40px;
            }
            .brand-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--accent);
                animation: glow 2.5s ease-in-out infinite;
            }
            @keyframes glow {
                0%,
                100% {
                    box-shadow: 0 0 7px var(--accent);
                    opacity: 1;
                }
                50% {
                    box-shadow: 0 0 2px var(--accent);
                    opacity: 0.5;
                }
            }
            .brand-name {
                font-family: 'Playfair Display', serif;
                font-size: 1.3rem;
                font-weight: 700;
            }
            .brand-name em {
                color: var(--accent);
                font-style: normal;
            }

            /* Headings */
            .heading {
                font-family: 'Playfair Display', serif;
                font-size: 2rem;
                font-weight: 300;
                letter-spacing: -0.5px;
                margin-bottom: 6px;
                line-height: 1.2;
            }
            .subheading {
                font-size: 11px;
                color: var(--muted);
                letter-spacing: 0.08em;
                margin-bottom: 36px;
            }

            /* Form */
            .field {
                margin-bottom: 14px;
            }
            .field label {
                display: block;
                font-size: 10px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 7px;
            }
            .field input {
                width: 100%;
                background: var(--s1);
                border: 1px solid var(--border);
                border-radius: 10px;
                color: var(--text);
                font-family: 'DM Mono', monospace;
                font-size: 13px;
                padding: 13px 16px;
                outline: none;
                transition: border-color 0.2s;
            }
            .field input:focus {
                border-color: rgba(240, 240, 240, 0.25);
            }
            .field input::placeholder {
                color: var(--dim);
            }

            /* Submit */
            .btn-submit {
                width: 100%;
                margin-top: 8px;
                padding: 14px;
                background: var(--accent);
                color: var(--bg);
                border: none;
                border-radius: 10px;
                font-family: 'DM Mono', monospace;
                font-size: 12px;
                font-weight: 500;
                letter-spacing: 0.15em;
                text-transform: uppercase;
                cursor: pointer;
                transition:
                    background 0.15s,
                    opacity 0.15s;
            }
            .btn-submit:hover {
                background: #ffffff;
            }
            .btn-submit:active {
                opacity: 0.85;
            }
            .btn-submit:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            /* Error / success */
            .msg {
                font-size: 11px;
                letter-spacing: 0.05em;
                padding: 11px 14px;
                border-radius: 8px;
                margin-bottom: 16px;
                display: none;
            }
            .msg.error {
                background: rgba(204, 68, 68, 0.1);
                border: 1px solid rgba(204, 68, 68, 0.25);
                color: #e08080;
                display: block;
            }
            .msg.success {
                background: rgba(240, 240, 240, 0.05);
                border: 1px solid rgba(240, 240, 240, 0.15);
                color: var(--muted);
                display: block;
            }

            /* Divider */
            .divider {
                display: flex;
                align-items: center;
                gap: 12px;
                margin: 28px 0 24px;
            }
            .divider-line {
                flex: 1;
                height: 1px;
                background: var(--border);
            }
            .divider-label {
                font-size: 10px;
                color: var(--dim);
                letter-spacing: 0.12em;
            }

            /* Toggle */
            .toggle-row {
                text-align: center;
                font-size: 11px;
                color: var(--muted);
                letter-spacing: 0.05em;
            }
            .toggle-btn {
                background: none;
                border: none;
                color: var(--accent);
                font-family: 'DM Mono', monospace;
                font-size: 11px;
                cursor: pointer;
                letter-spacing: 0.05em;
                text-decoration: underline;
                text-underline-offset: 3px;
            }
            .toggle-btn:hover {
                color: #ffffff;
            }

            /* Loading spinner inside button */
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            .spinner {
                display: inline-block;
                width: 12px;
                height: 12px;
                border: 2px solid rgba(17, 17, 17, 0.3);
                border-top-color: #111;
                border-radius: 50%;
                animation: spin 0.6s linear infinite;
                vertical-align: middle;
                margin-right: 6px;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="brand">
                <div class="brand-dot"></div>
                <div class="brand-name">Deep<em>Focus</em></div>
            </div>

            <div class="heading" id="heading">Welcome back.</div>
            <div class="subheading" id="subheading">
                Sign in to your workspace.
            </div>

            <div class="msg" id="msg"></div>

            <div class="field">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    autocomplete="email"
                />
            </div>

            <div class="field">
                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                />
            </div>

            <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">
                Sign In
            </button>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-label">or</div>
                <div class="divider-line"></div>
            </div>

            <div class="toggle-row" id="toggleRow">
                Don't have an account?
                <button class="toggle-btn" onclick="toggleMode()">
                    Create one
                </button>
            </div>
        </div>

        <script>
            const API_BASE = 'https://deep-focus.up.railway.app/api';
            let mode = 'login'; // 'login' | 'register'

            // If already logged in, go straight to app
            if (localStorage.getItem('df_token')) {
                window.location.href = 'deep-focus-v2.html';
            }

            function toggleMode() {
                mode = mode === 'login' ? 'register' : 'login';
                clearMsg();
                if (mode === 'register') {
                    document.getElementById('heading').textContent =
                        'Create account.';
                    document.getElementById('subheading').textContent =
                        'Start your deep work journey.';
                    document.getElementById('submitBtn').textContent =
                        'Create Account';
                    document.getElementById('toggleRow').innerHTML =
                        'Already have an account? <button class="toggle-btn" onclick="toggleMode()">Sign in</button>';
                    document.querySelector('#password').autocomplete =
                        'new-password';
                } else {
                    document.getElementById('heading').textContent =
                        'Welcome back.';
                    document.getElementById('subheading').textContent =
                        'Sign in to your workspace.';
                    document.getElementById('submitBtn').textContent =
                        'Sign In';
                    document.getElementById('toggleRow').innerHTML =
                        'Don\'t have an account? <button class="toggle-btn" onclick="toggleMode()">Create one</button>';
                    document.querySelector('#password').autocomplete =
                        'current-password';
                }
            }

            function showMsg(text, type = 'error') {
                const el = document.getElementById('msg');
                el.textContent = text;
                el.className = `msg ${type}`;
            }

            function clearMsg() {
                const el = document.getElementById('msg');
                el.className = 'msg';
            }

            function setLoading(on) {
                const btn = document.getElementById('submitBtn');
                btn.disabled = on;
                btn.innerHTML = on
                    ? `<span class="spinner"></span>${mode === 'login' ? 'Signing in…' : 'Creating account…'}`
                    : mode === 'login'
                      ? 'Sign In'
                      : 'Create Account';
            }

            async function handleSubmit() {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password)
                    return showMsg('Please fill in all fields.');
                if (password.length < 6)
                    return showMsg('Password must be at least 6 characters.');

                clearMsg();
                setLoading(true);

                const endpoint =
                    mode === 'login' ? '/auth/login' : '/auth/register';

                try {
                    const res = await fetch(API_BASE + endpoint, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({email, password}),
                    });
                    const data = await res.json();

                    if (!res.ok) {
                        showMsg(data.error || 'Something went wrong.');
                        setLoading(false);
                        return;
                    }

                    // Store token and redirect
                    localStorage.setItem('df_token', data.token);
                    localStorage.setItem('df_user', JSON.stringify(data.user));
                    showMsg('Redirecting…', 'success');
                    setTimeout(() => {
                        window.location.href = 'deep-focus-v2.html';
                    }, 600);
                } catch (err) {
                    showMsg('Could not connect to server. Is it running?');
                    setLoading(false);
                }
            }

            // Allow Enter key to submit
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleSubmit();
            });
        </script>
    </body>
</html>
